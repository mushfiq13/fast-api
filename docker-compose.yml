version: "3.9"

services:
  db:
    image: postgres:16
    container_name: lab2_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lab2_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata_lab2:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lab2_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7.0
    container_name: lab3_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: lab3_db
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  pgdata_lab2:
  mongodb_data:
    driver: local
