version: "3.9"

services:
  # Nginx Load Balancer
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    ports:
      - "80:80" # Expose port 80 to host
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # Mount config (read-only)
    depends_on:
      - fastapi1
      - fastapi2
    networks:
      - app-network
    restart: unless-stopped

  # FastAPI Instance 1
  fastapi1:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY app/ ./app/
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    container_name: fastapi1
    env_file:
      - .env
    environment:
      - INSTANCE_ID=FastAPI-1
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  fastapi2:
    build:
      context: .
      dockerfile_inline: |
        FROM python:3.12-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY app/ ./app/
        CMD ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    container_name: fastapi2
    env_file:
      - .env
    environment:
      - INSTANCE_ID=FastAPI-2
    networks:
      - app-network
    restart: unless-stopped
    depends_on:
      elasticsearch:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: db_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lab2_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lab2_db"]
      interval: 5s
      timeout: 5s
      retries: 20

  mongodb:
    image: mongo:7.0
    container_name: db_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongodb
      MONGO_INITDB_ROOT_PASSWORD: mongodb
      MONGO_INITDB_DATABASE: lab3_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Elasticsearch for search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    mem_limit: 1g
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - app-network
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  pgdata:
  mongodb_data:
    driver: local
  esdata:
  redisdata:

networks:
  app-network:
    driver: bridge
